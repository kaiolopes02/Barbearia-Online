<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Barber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">

        <!-- ===== TELA 1: WELCOME ===== -->
        <section id="screen-welcome" class="screen visible">
            <div class="noise-overlay"></div>
            <div class="welcome-content">
                <div class="logo-area">
                    <div class="logo-icon">✦</div>
                    <h1 class="brand-title">THE<br>BARBER</h1>
                    <p class="brand-tagline">Barbearia Premium</p>
                </div>

                <div class="info-card">
                    <div class="info-item">
                        <span class="info-icon">◆</span>
                        <span>Seg – Sáb &nbsp;·&nbsp; 09h às 18h</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">◆</span>
                        <span>Rua das Flores, 142 – Centro</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">◆</span>
                        <span>(11) 99999-0000</span>
                    </div>
                </div>

                <button class="btn-main" onclick="showScreen('screen-schedule')">
                    Agendar Agora
                </button>
            </div>
        </section>

        <!-- ===== TELA 2: AGENDAMENTO ===== -->
        <section id="screen-schedule" class="screen">
            <header class="header">
                <button class="back-link" onclick="showScreen('screen-welcome')" aria-label="Voltar">
                    <span>←</span>
                </button>
                <div>
                    <h2 class="screen-title">Agendamento</h2>
                    <p class="screen-sub">Preencha os dados abaixo</p>
                </div>
            </header>

            <div class="form-scroll">
                <div class="form-container">

                    <div class="input-field">
                        <label for="input-name">Seu Nome</label>
                        <input type="text" id="input-name" placeholder="Ex: Carlos Oliveira" autocomplete="off">
                    </div>

                    <div class="input-field">
                        <label for="input-data">Data</label>
                        <input type="date" id="input-data" onchange="updateAvailableSlots()">
                    </div>

                    <div class="input-field">
                        <label>Serviço</label>
                        <div class="service-grid">
                            <button class="service-card active" data-service="Corte" onclick="selectService(this)">
                                <span class="service-icon">✂</span>
                                <span class="service-name">Corte</span>
                                <span class="service-price">R$ 35</span>
                            </button>
                            <button class="service-card" data-service="Barba" onclick="selectService(this)">
                                <span class="service-icon">🪒</span>
                                <span class="service-name">Barba</span>
                                <span class="service-price">R$ 25</span>
                            </button>
                            <button class="service-card" data-service="Combo" onclick="selectService(this)">
                                <span class="service-icon">✦</span>
                                <span class="service-name">Combo</span>
                                <span class="service-price">R$ 55</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-field" id="slots-section" style="display:none">
                        <label>Horário Disponível</label>
                        <div class="time-slots" id="time-slots-container"></div>
                    </div>

                </div>
            </div>

            <div class="btn-area">
                <button id="btn-confirm" class="btn-main" onclick="finish()">
                    <span class="btn-text">Confirmar Agendamento</span>
                    <span class="btn-spinner" style="display:none"></span>
                </button>
            </div>
        </section>

        <!-- ===== TELA 3: SUCESSO ===== -->
        <section id="screen-success" class="screen">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h2 class="success-title">Confirmado!</h2>
                <p class="success-msg">Seu agendamento foi realizado com sucesso. Te esperamos!</p>
                <div class="success-details" id="success-details"></div>
                <button class="btn-main" onclick="resetApp()">Novo Agendamento</button>
            </div>
        </section>

    </div>

    <script src="js/scheduler.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
